<script>
    const BASE_URL = "https://kvfdfdcaidsdnohfcbeg.supabase.co/rest/v1";
    const API_KEY = "sb_publishable_AzZQ-7pqFS2klriLNXlCig_xRs8b1vV";

    const headers = {
        "apikey": API_KEY,
        "Authorization": `Bearer ${API_KEY}`,
        "Content-Type": "application/json",
        "Prefer": "return=representation"
    };

    let globalCategories = [];
    let stickyNotes = [];
    
    let globalFolderSortable = null;
    let globalItemSortables = [];
    let isFolderSortModeActive = false;
    let isItemSortModeActive = false;

    function openTab(tabId) {
        try {
            resetSortModes();
            
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.nav button').forEach(b => b.classList.remove('active-btn'));
            
            const targetTab = document.getElementById(tabId);
            const targetBtn = document.getElementById(`btn-${tabId}`);
            
            if (targetTab) targetTab.classList.add('active');
            if (targetBtn) targetBtn.classList.add('active-btn');
            
            if(tabId === 'main') loadCategories();
            if(tabId === 'status') loadInventoryStatus();
            if(tabId === 'inflow' || tabId === 'outflow') loadItems();
            if(tabId === 'notepad') renderNotes();
        } catch (err) { console.error(err); }
    }

    function resetSortModes() {
        if(globalFolderSortable) { globalFolderSortable.destroy(); globalFolderSortable = null; }
        globalItemSortables.forEach(s => { if(s) s.destroy(); });
        globalItemSortables = [];
        isFolderSortModeActive = false;
        isItemSortModeActive = false;
        
        const fBtn = document.getElementById('masterFolderSortBtn');
        const iBtn = document.getElementById('masterItemSortBtn');
        if(fBtn) fBtn.classList.remove('active-mode');
        if(iBtn) iBtn.classList.remove('active-mode');
    }

    window.onload = function() {
        try {
            const savedNotes = localStorage.getItem('system_sticky_notes');
            if(savedNotes) {
                stickyNotes = JSON.parse(savedNotes);
            } else {
                stickyNotes = [{ id: Date.now(), title: '💡 안내 가이드', content: '내용을 입력하면 자동 저장됩니다.', date: getFormattedDate() }];
                saveNotesToLocalStorage();
            }

            const savedCatOrder = localStorage.getItem('system_category_order');
            if (savedCatOrder) {
                globalCategories = JSON.parse(savedCatOrder);
            }

            loadItems();
            loadCategories();
        } catch(e) { console.error(e); }
        
        window.addEventListener('click', function(e) {
            if(!e.target.classList.contains('more-btn')) {
                document.querySelectorAll('.more-dropdown').forEach(d => d.classList.remove('show'));
            }
        });

        window.addEventListener('scroll', updateOpenDropdownPosition, true);
        window.addEventListener('resize', updateOpenDropdownPosition);
    };

    /* --- 📝 스티커 메모장 고정 및 저장 로직 (수정완료) --- */
    function getFormattedDate() {
        const now = new Date();
        return `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-${String(now.getDate()).padStart(2, '0')}`;
    }
    
    function saveNotesToLocalStorage() { 
        localStorage.setItem('system_sticky_notes', JSON.stringify(stickyNotes)); 
    }
    
    function addNewNote() {
        stickyNotes.unshift({ id: Date.now(), title: '', content: '', date: getFormattedDate() });
        saveNotesToLocalStorage();
        renderNotes();
    }
    
    // 키보드를 타이핑할 때 실시간으로 로컬 스토리지에 값을 동기화합니다.
    function updateNote(id, field, value) {
        const targetNote = stickyNotes.find(note => note.id === id);
        if(targetNote) { 
            targetNote[field] = value; 
            saveNotesToLocalStorage(); // 저장 함수 실시간 실행 트리거 추가
        }
    }
    
    function deleteNote(id) {
        if(!confirm('이 스티커 메모를 삭제하시겠습니까?')) return;
        stickyNotes = stickyNotes.filter(note => note.id !== id);
        saveNotesToLocalStorage();
        renderNotes();
    }
    
    function renderNotes() {
        const listContainer = document.getElementById('notesList');
        const keyword = document.getElementById('noteSearch').value.toLowerCase().trim();
        if(!listContainer) return;
        listContainer.innerHTML = '';
        const filteredNotes = stickyNotes.filter(note => note.title.toLowerCase().includes(keyword) || note.content.toLowerCase().includes(keyword));
        if(filteredNotes.length === 0) {
            listContainer.innerHTML = '<div style="text-align:center; color:#888; font-size:13px; padding:20px;">일치하는 메모가 없습니다.</div>';
            return;
        }
        filteredNotes.forEach(note => {
            const card = document.createElement('div');
            card.className = 'note-card';
            card.innerHTML = `
                <div class="note-card-header">
                    <span class="note-date">${note.date}</span>
                    <button class="delete-note-btn" onclick="deleteNote(${note.id})">✕</button>
                </div>
                <input type="text" class="note-input-title" placeholder="제목 없음" value="${note.title || ''}" oninput="updateNote(${note.id}, 'title', this.value)">
                <textarea class="note-input-content" placeholder="메모 입력..." oninput="updateNote(${note.id}, 'content', this.value)">${note.content || ''}</textarea>
            `;
            listContainer.appendChild(card);
        });
    }

    /* --- 코어 데이터 처리 로직 --- */
    function checkNewCategory(select) {
        const input = document.getElementById('newCategoryInput');
        if(select.value === '__NEW__') { input.style.display = 'block'; input.focus(); } 
        else { input.style.display = 'none'; }
    }
    function normalizeCategory(cat) {
        if(!cat || String(cat).trim() === '' || String(cat).trim() === 'null') return '미지정분류';
        return String(cat).trim();
    }
    async function loadCategories() {
        try {
            const response = await fetch(`${BASE_URL}/items?select=category`, { headers });
            if(!response.ok) return;
            const data = await response.json();
            const dbCats = Array.isArray(data) ? data.map(item => normalizeCategory(item.category)) : [];
            
            const uniqueCats = [...new Set(dbCats)].filter(c => c !== '기본분류');
            
            if (globalCategories.length === 0) {
                globalCategories = uniqueCats;
            } else {
                uniqueCats.forEach(c => {
                    if(!globalCategories.includes(c)) globalCategories.push(c);
                });
                globalCategories = globalCategories.filter(c => uniqueCats.includes(c));
            }
            localStorage.setItem('system_category_order', JSON.stringify(globalCategories));
            
            const select = document.getElementById('itemCategorySelect');
            if(select) {
                let options = '';
                if(globalCategories.length === 0) {
                    options += `<option value="">선택 가능한 분류 없음 (새 분류를 생성하세요)</option>`;
                } else {
                    globalCategories.forEach(cat => { options += `<option value="${cat}">${cat}</option>`; });
                }
                options += `<option value="__NEW__">+ 새 분류 파일 만들기...</option>`;
                select.innerHTML = options;
                document.getElementById('newCategoryInput').style.display = 'none';
            }
        } catch (e) { console.error(e); }
    }

    async function loadItems() {
        try {
            const response = await fetch(`${BASE_URL}/items?select=name&order=sort_order.asc`, { headers });
            if(!response.ok) return;
            const data = await response.json();
            let options = '<option value="">물품을 선택하세요</option>';
            if(Array.isArray(data)){
                data.forEach(item => { if(item && item.name) options += `<option value="${item.name}">${item.name}</option>`; });
            }
            if(document.getElementById('inItemSelect')) document.getElementById('inItemSelect').innerHTML = options;
            if(document.getElementById('outItemSelect')) document.getElementById('outItemSelect').innerHTML = options;
        } catch (error) { console.error(error); }
    }

    async function addItem() {
        const select = document.getElementById('itemCategorySelect');
        const newInput = document.getElementById('newCategoryInput');
        let category = select.value;
        if(category === '__NEW__') {
            category = newInput.value.trim();
            if(!category) return alert('새로운 분류 명칭을 입력해 주세요.');
        }
        if(!category) return alert('분류를 선택하거나 새로 생성해주세요.');
        category = normalizeCategory(category);
        const name = document.getElementById('itemName').value.trim();
        const memo = document.getElementById('itemMemo').value.trim();
        if(!name) return alert('물품명을 입력해주세요.');

        try {
            const countRes = await fetch(`${BASE_URL}/items?select=id`, { headers });
            const countData = await countRes.json();
            const nextOrder = (countData ? countData.length : 0) + 1;

            await fetch(`${BASE_URL}/items`, {
                method: 'POST', headers,
                body: JSON.stringify({ name, memo, category, sort_order: nextOrder })
            });
            alert(`[${category} > ${name}] 등록 완료!`);
            document.getElementById('itemName').value = '';
            document.getElementById('itemMemo').value = '';
            newInput.value = '';
            loadCategories();
        } catch (error) { alert("오류: " + error.message); }
    }

    async function logStock(type) {
        const prefix = type === '입고' ? 'in' : 'out';
        const itemName = document.getElementById(`${prefix}ItemSelect`).value;
        const count = parseInt(document.getElementById(`${prefix}Count`).value);
        const note = document.getElementById(`${prefix}Note`).value.trim();
        if(!itemName) return alert('물품을 선택하세요.');
        if(!count || count <= 0) return alert('정확한 수량을 입력하세요.');

        try {
            await fetch(`${BASE_URL}/stock_logs`, {
                method: 'POST', headers,
                body: JSON.stringify({ type, item_name: itemName, count, note })
            });
            alert(`${itemName} ${count}개 ${type} 완료!`);
            document.getElementById(`${prefix}Count`).value = '';
            document.getElementById(`${prefix}Note`).value = '';
        } catch (error) { alert("처리 오류: " + error.message); }
    }

    function createNewCategoryFromStatus() {
        const newCatName = prompt('새로 만들 분류 파일(폴더) 이름을 지정하세요:');
        if(!newCatName || newCatName.trim() === '') return;
        const target = normalizeCategory(newCatName);
        if(globalCategories.includes(target)) return alert('이미 존재하는 분류 파일입니다.');
        
        globalCategories.push(target);
        localStorage.setItem('system_category_order', JSON.stringify(globalCategories));
        alert(`[${target}] 분류가 추가되었습니다.`);
        loadInventoryStatus();
    }

    function toggleMoreMenu(event) {
        event.stopPropagation();
        const btn = event.target;
        const dropdown = btn.nextElementSibling;
        const isOpen = dropdown.classList.contains('show');
        
        document.querySelectorAll('.more-dropdown').forEach(d => d.classList.remove('show'));
        
        if(!isOpen && dropdown) {
            dropdown.classList.add('show');
            btn.setAttribute('data-active-dropdown', 'true');
            positionDropdown(btn, dropdown);
        } else {
            btn.removeAttribute('data-active-dropdown');
        }
    }

    function positionDropdown(btn, dropdown) {
        const rect = btn.getBoundingClientRect();
        dropdown.style.top = (rect.bottom + window.scrollY) + 'px';
        dropdown.style.left = (rect.right - dropdown.offsetWidth + window.scrollX) + 'px';
        dropdown.style.position = 'fixed';
    }

    function updateOpenDropdownPosition() {
        const activeBtn = document.querySelector('[data-active-dropdown="true"]');
        if (activeBtn) {
            const dropdown = activeBtn.nextElementSibling;
            if (dropdown && dropdown.classList.contains('show')) {
                positionDropdown(activeBtn, dropdown);
            }
        }
    }

    function toggleMasterFolderSort() {
        const btn = document.getElementById('masterFolderSortBtn');
        const container = document.getElementById('itemStatusList');

        if (isFolderSortModeActive) {
            resetSortModes();
            alert('🔒 모든 분류 파일(폴더) 정렬 배치가 저장 완료되었습니다.');
            loadInventoryStatus();
            return;
        }

        resetSortModes();

        isFolderSortModeActive = true;
        btn.classList.add('active-mode');

        document.querySelectorAll('.category-section').forEach(s => s.classList.add('sort-mode-folder-active'));

        globalFolderSortable = Sortable.create(container, {
            animation: 200,
            ghostClass: 'sortable-ghost',
            chosenClass: 'sortable-chosen',
            onEnd() {
                const sections = container.querySelectorAll('.category-section');
                const newFolderOrder = [];
                sections.forEach(sec => {
                    newFolderOrder.push(sec.getAttribute('data-catname'));
                });
                globalCategories = newFolderOrder;
                localStorage.setItem('system_category_order', JSON.stringify(globalCategories));
            }
        });

        alert('📁 [파일(폴더) 정렬 모드]가 활성화되었습니다!\n이제 파란색 점선 칸 아무 곳이나 마우스로 잡고 끌어당겨 정렬하세요.\n완료되면 상단의 버튼을 다시 눌러 고정시키세요.');
    }

    function toggleMasterItemSort() {
        const btn = document.getElementById('masterItemSortBtn');

        if (isItemSortModeActive) {
            resetSortModes();
            alert('🔒 모든 내부 물품의 배치가 안전하게 업데이트 및 정렬 저장되었습니다.');
            loadInventoryStatus();
            return;
        }

        resetSortModes();

        isItemSortModeActive = true;
        btn.classList.add('active-mode');

        document.querySelectorAll('.item-card').forEach(c => c.classList.add('sort-mode-item-active'));

        const containers = document.querySelectorAll('.items-drag-container');
        containers.forEach(dragContainer => {
            const sortableInstance = Sortable.create(dragContainer, {
                animation: 200,
                ghostClass: 'sortable-ghost',
                chosenClass: 'sortable-chosen',
                async onEnd() {
                    const cards = dragContainer.querySelectorAll('.item-card');
                    for(let i = 0; i < cards.length; i++) {
                        const id = cards[i].getAttribute('data-itemid');
                        await fetch(`${BASE_URL}/items?id=eq.${id}`, {
                            method: 'PATCH', headers, body: JSON.stringify({ sort_order: i + 1 })
                        });
                    }
                }
            });
            globalItemSortables.push(sortableInstance);
        });

        alert('📦 [내부 물품 자료 정렬 모드]가 활성화되었습니다!\n이제 노란색 점선 칸 아무 곳이나 마우스로 자유롭게 잡고 드래그하세요.\n완료되면 상단의 버튼을 다시 눌러 모드를 끄세요.');
    }

    async function renameItemFromServer(itemId, oldItemName, event) {
        event.stopPropagation();
        const newItemName = prompt(`[${oldItemName}] 물품의 새로운 이름을 입력하세요:`, oldItemName);
        if(!newItemName || newItemName.trim() === '' || newItemName.trim() === oldItemName) return;
        
        const targetName = newItemName.trim();
        try {
            const itemPatch = await fetch(`${BASE_URL}/items?id=eq.${itemId}`, {
                method: 'PATCH', headers, body: JSON.stringify({ name: targetName })
            });

            if(!itemPatch.ok) throw new Error('서버 물품명 변경 실패');

            await fetch(`${BASE_URL}/stock_logs?item_name=eq.${oldItemName}`, {
                method: 'PATCH', headers, body: JSON.stringify({ item_name: targetName })
            });

            alert(`물품명이 [ ${targetName} ] (으)로 변경 및 동기화되었습니다.`);
            loadInventoryStatus();
        } catch(e) { 
            alert("수정 오류: " + e.message); 
        }
    }

    async function renameCategoryFromStatus(oldCatName, event) {
        event.stopPropagation();
        const newCatName = prompt(`[${oldCatName}] 분류의 새 이름을 입력하세요:`, oldCatName);
        if(!newCatName || newCatName.trim() === '' || newCatName === oldCatName) return;
        const normalizedNew = normalizeCategory(newCatName);
        if(globalCategories.includes(normalizedNew)) return alert('이미 존재하는 분류 이름입니다.');

        try {
            await fetch(`${BASE_URL}/items?category=eq.${oldCatName}`, {
                method: 'PATCH', headers, body: JSON.stringify({ category: normalizedNew })
            });
            globalCategories = globalCategories.map(c => c === oldCatName ? normalizedNew : c);
            localStorage.setItem('system_category_order', JSON.stringify(globalCategories));
            alert('변경완료');
            loadInventoryStatus();
        } catch(e) { alert(e.message); }
    }

    async function deleteCategoryFromStatus(catName, event) {
        event.stopPropagation();
        if(!confirm(`[${catName}] 폴더와 하위 물품을 모두 서버에서 전면 삭제할까요?`)) return;
        try {
            await fetch(`${BASE_URL}/items?category=eq.${catName}`, { method: 'DELETE', headers });
            globalCategories = globalCategories.filter(c => c !== catName);
            localStorage.setItem('system_category_order', JSON.stringify(globalCategories));
            loadInventoryStatus();
        } catch(e) { alert(e.message); }
    }

    async function loadInventoryStatus() {
        const container = document.getElementById('itemStatusList');
        if(!container) return;

        try {
            const itemRes = await fetch(`${BASE_URL}/items?select=*&order=sort_order.asc`, { headers });
            if (!itemRes.ok) { container.innerHTML = `⚠️ DB 로드 실패`; return; }
            const itemsData = await itemRes.json();

            const logRes = await fetch(`${BASE_URL}/stock_logs?select=*&order=created_at.desc`, { headers });
            const logsData = logRes.ok ? await logRes.json() : [];

            container.innerHTML = '';

            itemsData.forEach(item => { item.category = normalizeCategory(item.category); });
            const activeDbCategories = itemsData.map(item => item.category);
            
            let allCategories = [...globalCategories];
            activeDbCategories.forEach(c => { if(!allCategories.includes(c)) allCategories.push(c); });
            allCategories = allCategories.filter(c => c && c !== '기본분류');

            const groups = {};
            allCategories.forEach(c => groups[c] = []);
            itemsData.forEach(item => { if(groups[item.category]) groups[item.category].push(item); });

            allCategories.forEach(catName => {
                const matchedItems = groups[catName] || [];
                const section = document.createElement('div');
                section.className = 'category-section';
                section.setAttribute('data-catname', catName);
                if(isFolderSortModeActive) section.classList.add('sort-mode-folder-active');
                
                section.innerHTML = `
                    <div class="category-title">
                        <div>📁 ${catName} <span style="font-size:12px; font-weight:normal; color:#888;">(${matchedItems.length}개)</span></div>
                        <div class="more-menu-container">
                            <button class="more-btn" onclick="toggleMoreMenu(event)">⋮</button>
                            <div class="more-dropdown">
                                <button onclick="renameCategoryFromStatus('${catName}', event)">✏️ 폴더 이름 수정</button>
                                <button class="del-action" onclick="deleteCategoryFromStatus('${catName}', event)">🗑️ 분류 전체삭제</button>
                            </div>
                        </div>
                    </div>
                    <div class="items-drag-container" style="min-height:20px;"></div>
                `;

                const dragContainer = section.querySelector('.items-drag-container');

                if(matchedItems.length === 0) {
                    dragContainer.innerHTML = `<div class="empty-notice" style="color:#bbb; font-size:13px; text-align:center; padding:10px;">이 분류 파일은 비어있습니다.</div>`;
                } else {
                    matchedItems.forEach(item => {
                        const itemLogs = Array.isArray(logsData) ? logsData.filter(log => log && log.item_name === item.name) : [];
                        let totalStock = 0;
                        itemLogs.forEach(l => {
                            if(l.type === '입고') totalStock += (l.count || 0);
                            if(l.type === '출고') totalStock -= (l.count || 0);
                        });

                        const card = document.createElement('div');
                        card.className = 'item-card';
                        card.setAttribute('data-itemid', item.id);
                        if(isItemSortModeActive) card.classList.add('sort-mode-item-active');

                        let historyHtml = '';
                        if(itemLogs.length === 0) {
                            historyHtml = '<div style="color:#999; text-align:center; padding:10px;">기록이 없습니다.</div>';
                        } else {
                            itemLogs.forEach(log => {
                                const dt = new Date(log.created_at);
                                historyHtml += `
                                    <div class="log-row">
                                        <div>
                                            <span style="font-weight:bold; color:${log.type === '입고' ? '#0d6efd' : '#dc3545'}">[${log.type}]</span> 
                                            <strong>${log.count}개</strong> <span style="font-size:12px; color:#777;">(${dt.toLocaleDateString('ko-KR')})</span>
                                            ${log.note ? `<div class="log-note">💡 ${log.note}</div>` : ''}
                                        </div>
                                        <div class="log-actions">
                                            <button class="sm-edit-btn" onclick="editLogDetail('${log.id}', '${log.type}', ${log.count}, '${log.note || ''}', event)">수정</button>
                                            <button class="btn-danger" style="padding: 4px 6px; font-size: 11px;" onclick="deleteLogDetail('${log.id}', event)">삭제</button>
                                        </div>
                                    </div>
                                ];
                            });
                        }

                        card.innerHTML = `
                            <div class="item-header" onclick="toggleHistory(this)">
                                <div class="item-info">
                                    <span class="item-title">${item.name}</span>
                                    <span class="stock-badge">재고: ${totalStock}개</span>
                                </div>
                                <div class="more-menu-container">
                                    <button class="more-btn" onclick="toggleMoreMenu(event)">⋮</button>
                                    <div class="more-dropdown">
                                        <button onclick="renameItemFromServer('${item.id}', '${item.name}', event)">✏️ 물품 이름 수정</button>
                                        <button onclick="moveItemCategory('${item.id}', '${item.name}', '${catName}', event)">📁 다른 분류로 이동</button>
                                        <button class="del-action" onclick="deleteItemFromServer('${item.id}', '${item.name}', event)">🗑️ 물품 삭제</button>
                                    </div>
                                </div>
                            </div>
                            <div class="history-content">${historyHtml}</div>
                        `;
                        dragContainer.appendChild(card);
                    });
                }
                container.appendChild(section);
            });

            if(isFolderSortModeActive) {
                globalFolderSortable = Sortable.create(container, {
                    animation: 200, ghostClass: 'sortable-ghost', chosenClass: 'sortable-chosen',
                    onEnd() {
                        const sections = container.querySelectorAll('.category-section');
                        const newFolderOrder = [];
                        sections.forEach(sec => { newFolderOrder.push(sec.getAttribute('data-catname')); });
                        globalCategories = newFolderOrder;
                        localStorage.setItem('system_category_order', JSON.stringify(globalCategories));
                    }
                });
            }
            if(isItemSortModeActive) {
                const containers = document.querySelectorAll('.items-drag-container');
                containers.forEach(dragContainer => {
                    const sortableInstance = Sortable.create(dragContainer, {
                        animation: 200, ghostClass: 'sortable-ghost', chosenClass: 'sortable-chosen',
                        async onEnd() {
                            const cards = dragContainer.querySelectorAll('.item-card');
                            for(let i = 0; i < cards.length; i++) {
                                const id = cards[i].getAttribute('data-itemid');
                                await fetch(`${BASE_URL}/items?id=eq.${id}`, {
                                    method: 'PATCH', headers, body: JSON.stringify({ sort_order: i + 1 })
                                });
                            }
                        }
                    });
                    globalItemSortables.push(sortableInstance);
                });
            }

        } catch (error) { console.error(error); }
    }

    function toggleHistory(headerElement) {
        if(headerElement && headerElement.nextElementSibling && !event.target.classList.contains('more-btn')) {
            headerElement.nextElementSibling.classList.toggle('show');
        }
    }
    async function deleteItemFromServer(itemId, itemName, event) {
        event.stopPropagation();
        if (!confirm(`[ ${itemName} ] 자재 물품을 정말 삭제합니까?`)) return;
        try {
            await fetch(`${BASE_URL}/items?id=eq.${itemId}`, { method: 'DELETE', headers });
            loadInventoryStatus();
        } catch (e) { alert(e.message); }
    }
    async function deleteLogDetail(logId, event) {
        event.stopPropagation();
        if (!confirm("단일 기록을 완전히 지울까요?")) return;
        try {
            await fetch(`${BASE_URL}/stock_logs?id=eq.${logId}`, { method: 'DELETE', headers });
            loadInventoryStatus();
        } catch (e) { alert(e.message); }
    }
    async function moveItemCategory(itemId, itemName, currentCat, event) {
        event.stopPropagation();
        let catListTxt = globalCategories.map((c, i) => `${i + 1}. ${c}`).join('\n');
        const choice = prompt(`[${itemName}] 물품을 보낼 대상 폴더 번호 입력:\n\n${catListTxt}`);
        if(!choice) return;
        const idx = parseInt(choice) - 1;
        if(isNaN(idx) || idx < 0 || idx >= globalCategories.length) return alert('유효하지 않은 번호입니다.');
        const targetCategory = globalCategories[idx];
        if(targetCategory === currentCat) return;

        try {
            await fetch(`${BASE_URL}/items?id=eq.${itemId}`, {
                method: 'PATCH', headers, body: JSON.stringify({ category: targetCategory, sort_order: 999 })
            });
            loadInventoryStatus();
        } catch(e) { alert(e.message); }
    }
    async function editLogDetail(logId, currentType, currentCount, currentNote, event) {
        event.stopPropagation();
        const newType = prompt("구분 입력 (입고 / 출고):", currentType);
        if(newType !== '입고' && newType !== '출고') return alert('틀린 구분값입니다.');
        const newCount = parseInt(prompt("수량 입력:", currentCount));
        if(isNaN(newCount) || newCount <= 0) return alert('오류 수량');
        const newNote = prompt("특이사항 입력:", currentNote);
        try {
            await fetch(`${BASE_URL}/stock_logs?id=eq.${logId}`, {
                method: 'PATCH', headers, body: JSON.stringify({ type: newType, count: newCount, note: newNote })
            });
            loadInventoryStatus();
        } catch (e) { alert(e.message); }
    }
</script>
